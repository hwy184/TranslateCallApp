<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Translate AI</title>
    <!-- SỬ DỤNG FILE CỤC BỘ ĐÃ TẢI VỀ -->
    <script src="/static/livekit-client.umd.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text; /* Fix lint */
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        select {
            background: rgba(30, 41, 59, 1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }

        .chat-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .panel {
            background: rgba(2, 6, 23, 0.6);
            border-radius: 16px;
            padding: 1.5rem;
            height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .panel-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .msg-vn { color: #facc15; margin-bottom: 0.5rem; }
        .msg-en { color: #4ade80; margin-bottom: 0.5rem; font-style: italic; }

        #visualizer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 40px;
            margin-top: 1rem;
        }

        .bar {
            width: 4px;
            height: 5px;
            background: var(--primary);
            border-radius: 2px;
            transition: height 0.1s;
        }

        .status {
            text-align: center;
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI TRANSLATE</h1>
        
        <div class="controls">
            <select id="micSelect">
                <option value="">-- Choose Microphone --</option>
            </select>
            <div class="btn-group">
                <button id="connectBtn">START SYSTEM</button>
                <button id="disconnectBtn" style="background: #ef4444; display: none;">STOP</button>
            </div>
        </div>

        <div id="visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div class="chat-area">
            <div>
                <div class="panel-label">Vietnamese (Speech)</div>
                <div class="panel" id="vn-panel"></div>
            </div>
            <div>
                <div class="panel-label">English (Translation)</div>
                <div class="panel" id="en-panel"></div>
            </div>
        </div>

        <div class="status" id="statusMsg">Ready (Server: Localhost)</div>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const micSelect = document.getElementById('micSelect');
        const vnPanel = document.getElementById('vn-panel');
        const enPanel = document.getElementById('en-panel');
        const statusMsg = document.getElementById('statusMsg');
        
        // NAMESPACE CHUẨN LÀ LivekitClient
        const LSK = typeof LivekitClient !== 'undefined' ? LivekitClient : LiveKit;

        let room;

        // POPULATE MIC LIST
        async function updateMics() {
            try {
                // Request temporary permission to list devices
                await navigator.mediaDevices.getUserMedia({ audio: true });
                const devices = await LSK.Room.getLocalDevices('audioinput');
                micSelect.innerHTML = devices.map(d => `<option value="${d.deviceId}">${d.label || 'Microphone'}</option>`).join('');
            } catch (e) {
                console.error("Mic permission denied", e);
                statusMsg.innerText = "Please allow mic access to list devices.";
            }
        }
        updateMics();

        connectBtn.onclick = async () => {
            const url = prompt("Enter LiveKit WSS URL (from .env):", localStorage.getItem('lk_url') || "wss://...");
            if(!url) return;
            localStorage.setItem('lk_url', url);

            statusMsg.innerText = "Connecting...";
            connectBtn.style.display = 'none';
            disconnectBtn.style.display = 'block';

            try {
                const response = await fetch('/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ room_name: 'main-room', participant_name: 'Nhat_User' })
                });
                const { token } = await response.json();
                
                room = new LSK.Room();
                
                room.on(LSK.RoomEvent.DataReceived, (payload) => {
                    const data = JSON.parse(new TextDecoder().decode(payload));
                    if(data.type === 'stt') {
                        vnPanel.innerHTML += `<div class="msg-vn"><strong>VN:</strong> ${data.text}</div>`;
                        vnPanel.scrollTop = vnPanel.scrollHeight;
                    } else if(data.type === 'translation') {
                        enPanel.innerHTML += `<div class="msg-en"><strong>EN:</strong> ${data.text}</div>`;
                        enPanel.scrollTop = enPanel.scrollHeight;
                    }
                });

                room.on(LSK.RoomEvent.TrackSubscribed, (track) => {
                    if (track.kind === "audio") track.attach();
                });

                await room.connect(url, token);
                
                // CONNECT WITH SELECTED MIC
                const deviceId = micSelect.value;
                await room.localParticipant.setMicrophoneEnabled(true, { deviceId });
                
                statusMsg.innerText = "SYSTEM ACTIVE - Talk now!";
            } catch (e) {
                alert(e.message);
                resetUI();
            }
        };

        disconnectBtn.onclick = async () => {
            if(room) await room.disconnect();
            resetUI();
        }

        function resetUI() {
            connectBtn.style.display = 'block';
            disconnectBtn.style.display = 'none';
            statusMsg.innerText = "Disconnected";
        }

        function addMessage(panel, text, className) {
            const div = document.createElement('div');
            div.className = className;
            div.innerText = text;
            panel.appendChild(div);
            panel.scrollTop = panel.scrollHeight;
        }

        // Live mic visualizer (subtle)
        setInterval(() => {
            if (room && room.localParticipant.isMicrophoneEnabled) {
                document.querySelectorAll('.bar').forEach(bar => {
                    bar.style.height = (Math.random() * 30 + 5) + 'px';
                });
            } else {
                document.querySelectorAll('.bar').forEach(bar => bar.style.height = '5px');
            }
        }, 100);
    </script>
</body>
</html>
