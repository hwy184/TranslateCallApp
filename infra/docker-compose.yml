services:
  backend:
    build:
      context: ../backend-node
      dockerfile: Dockerfile
    container_name: voice_backend
    env_file:
      - path: ../backend-node/.env.example
        required: true
      - path: ../backend-node/.env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/voice_translation
      WORKER_INTERNAL_URL: http://worker:8000
      WORKER_INTERNAL_URLS: http://worker:8000,http://worker2:8000,http://worker3:8000,http://worker4:8000,http://worker5:8000,http://worker6:8000,http://worker7:8000,http://worker8:8000
    ports:
      - "3000:8080"
    depends_on:
      worker:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../worker-python
      dockerfile: Dockerfile
    container_name: voice_worker
    env_file:
      - path: ../worker-python/.env.example
        required: true
      - path: ../worker-python/.env
        required: false
      - path: ../.env
        required: false
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-sa.json
      BACKEND_EVENTS_URL: http://backend:8080/api/v1/internal/worker/events
      BACKEND_WORKER_SECRET: change-me-worker-secret
    volumes:
      - ../secrets/gcp-sa.json:/secrets/gcp-sa.json:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

