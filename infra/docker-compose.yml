services:
  backend:
    build:
      context: ../backend-node
      dockerfile: Dockerfile
    container_name: voice_backend
    env_file:
      - path: ../backend-node/.env.example
        required: true
      - path: ../backend-node/.env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/voice_translation
    ports:
      - "3000:3000"
    depends_on:
      worker:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../worker-python
      dockerfile: Dockerfile
    container_name: voice_worker
    env_file:
      - path: ../worker-python/.env.example
        required: true
      - path: ../worker-python/.env
        required: false
      - path: ../.env
        required: false
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-sa.json
    volumes:
      - ../secrets/gcp-sa.json:/secrets/gcp-sa.json:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: voice_postgres
    environment:
      POSTGRES_DB: voice_translation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - voice_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voice_translation"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  voice_postgres_data:
